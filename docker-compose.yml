services:
  qdrant:
    image: qdrant/qdrant:v1.18.2
    restart: unless-stopped
    ports:
      - "6333:6333"       # REST/dashboard
      - "6334:6334"       # gRPC
    volumes:
      - ./qdrant_storage:/qdrant/storage   # reutiliza tus datos existentes

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - qdrant
    env_file:
      - .env                               # GEMINI_API_KEY, EMBED_DIM, modelos…
    environment:
      - QDRANT_URL=http://qdrant:6333      # dentro de la red de Docker, NO localhost
    ports:
      - "8501:8501"
    volumes:
      - ./app.py:/app/app.py:ro            # código en vivo: edita y 'docker compose restart app'
      - ./corpus:/app/corpus               # suelta documentos aquí (en el host)
      - ./storage:/app/storage             # páginas renderizadas + manifiesto
